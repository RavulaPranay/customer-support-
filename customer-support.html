<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customer Support Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #161a23;
    --surface2: #1e2433;
    --border: #2a3045;
    --accent: #4f8ef7;
    --accent2: #7b61ff;
    --text: #e8ecf4;
    --text-muted: #6b7a99;
    --user-bubble: #1e3a6e;
    --bot-bubble: #1a1f2e;
    --escalate: #1a3a5c;
    --escalate-border: #2d6fbe;
    --escalate-text: #7ab3f5;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  /* Subtle background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(79,142,247,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(79,142,247,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* Header */
  header {
    position: relative;
    z-index: 10;
    padding: 18px 28px;
    border-bottom: 1px solid var(--border);
    background: rgba(13,15,20,0.95);
    backdrop-filter: blur(12px);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header-left { display: flex; align-items: center; gap: 14px; }
  .logo-dot {
    width: 38px; height: 38px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    box-shadow: 0 0 18px rgba(79,142,247,0.3);
  }
  .header-title {
    font-family: 'Syne', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 0.02em;
    color: var(--text);
  }
  .header-sub {
    font-size: 0.72rem;
    color: var(--text-muted);
    margin-top: 1px;
  }
  .status-pill {
    display: flex; align-items: center; gap: 7px;
    background: rgba(79,142,247,0.08);
    border: 1px solid rgba(79,142,247,0.2);
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 0.72rem;
    color: var(--accent);
    font-weight: 500;
  }
  .status-dot {
    width: 7px; height: 7px;
    background: #4ade80;
    border-radius: 50%;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; box-shadow: 0 0 0 0 rgba(74,222,128,0.4); }
    50% { opacity: 0.8; box-shadow: 0 0 0 5px rgba(74,222,128,0); }
  }

  /* Chat area */
  .chat-container {
    flex: 1;
    overflow-y: auto;
    padding: 28px 20px;
    display: flex;
    flex-direction: column;
    gap: 18px;
    position: relative;
    z-index: 1;
    scroll-behavior: smooth;
  }
  .chat-container::-webkit-scrollbar { width: 4px; }
  .chat-container::-webkit-scrollbar-track { background: transparent; }
  .chat-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* Messages */
  .message-row {
    display: flex;
    gap: 10px;
    animation: fadeUp 0.3s ease forwards;
    opacity: 0;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .message-row.user { flex-direction: row-reverse; }
  .avatar {
    width: 32px; height: 32px;
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .avatar.bot {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    box-shadow: 0 0 12px rgba(79,142,247,0.25);
  }
  .avatar.user {
    background: var(--surface2);
    border: 1px solid var(--border);
  }
  .bubble {
    max-width: min(480px, 75vw);
    padding: 12px 16px;
    border-radius: 14px;
    font-size: 0.88rem;
    line-height: 1.6;
    position: relative;
  }
  .bubble.bot {
    background: var(--bot-bubble);
    border: 1px solid var(--border);
    border-top-left-radius: 4px;
    color: var(--text);
  }
  .bubble.user {
    background: var(--user-bubble);
    border: 1px solid rgba(79,142,247,0.25);
    border-top-right-radius: 4px;
    color: var(--text);
  }
  .bubble.escalate {
    background: var(--escalate);
    border: 1px solid var(--escalate-border);
    border-top-left-radius: 4px;
    color: var(--escalate-text);
  }
  .escalate-tag {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--accent);
    background: rgba(79,142,247,0.1);
    border: 1px solid rgba(79,142,247,0.2);
    border-radius: 20px;
    padding: 3px 9px;
    margin-bottom: 7px;
    display: flex;
  }
  .timestamp {
    font-size: 0.65rem;
    color: var(--text-muted);
    margin-top: 5px;
    text-align: right;
  }
  .message-row.user .timestamp { text-align: left; }

  /* Typing indicator */
  .typing-indicator {
    display: flex; align-items: center; gap: 5px;
    padding: 12px 16px;
    background: var(--bot-bubble);
    border: 1px solid var(--border);
    border-radius: 14px;
    border-top-left-radius: 4px;
    width: fit-content;
  }
  .typing-dot {
    width: 6px; height: 6px;
    background: var(--text-muted);
    border-radius: 50%;
    animation: typing 1.2s infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typing {
    0%,60%,100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-5px); opacity: 1; }
  }

  /* Welcome message */
  .welcome {
    text-align: center;
    padding: 40px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
  .welcome-icon {
    width: 56px; height: 56px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    font-size: 26px;
    box-shadow: 0 0 30px rgba(79,142,247,0.2);
    margin-bottom: 4px;
  }
  .welcome h2 {
    font-family: 'Syne', sans-serif;
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--text);
  }
  .welcome p {
    font-size: 0.85rem;
    color: var(--text-muted);
    max-width: 300px;
    line-height: 1.6;
  }
  .suggested-questions {
    display: flex; flex-wrap: wrap; gap: 8px;
    justify-content: center;
    margin-top: 8px;
  }
  .suggested-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 7px 14px;
    font-size: 0.78rem;
    color: var(--text-muted);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
  }
  .suggested-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(79,142,247,0.06);
  }

  /* Input area */
  .input-area {
    position: relative;
    z-index: 10;
    padding: 16px 20px 20px;
    border-top: 1px solid var(--border);
    background: rgba(13,15,20,0.97);
    backdrop-filter: blur(12px);
  }
  .input-wrapper {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 10px 12px 10px 16px;
    transition: border-color 0.2s;
  }
  .input-wrapper:focus-within {
    border-color: rgba(79,142,247,0.5);
    box-shadow: 0 0 0 3px rgba(79,142,247,0.06);
  }
  textarea {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    line-height: 1.5;
    resize: none;
    max-height: 120px;
    min-height: 22px;
    overflow-y: auto;
  }
  textarea::placeholder { color: var(--text-muted); }
  textarea::-webkit-scrollbar { width: 3px; }
  textarea::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .send-btn {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 10px;
    color: white;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
    box-shadow: 0 0 12px rgba(79,142,247,0.3);
  }
  .send-btn:hover { transform: scale(1.05); box-shadow: 0 0 18px rgba(79,142,247,0.45); }
  .send-btn:active { transform: scale(0.97); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .send-btn svg { width: 16px; height: 16px; }
  .input-hint {
    font-size: 0.68rem;
    color: var(--text-muted);
    text-align: center;
    margin-top: 8px;
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="logo-dot">🤖</div>
    <div>
      <div class="header-title">Customer Support Assistant</div>
      <div class="header-sub">Powered by AI · Available 24/7</div>
    </div>
  </div>
  <div class="status-pill">
    <div class="status-dot"></div>
    Online
  </div>
</header>

<div class="chat-container" id="chatContainer">
  <div class="welcome" id="welcome">
    <div class="welcome-icon">💬</div>
    <h2>How can I help you?</h2>
    <p>Ask me anything about our products, services, or policies. I'm here to assist you.</p>
    <div class="suggested-questions">
      <button class="suggested-btn" onclick="sendSuggested(this)">What is your return policy?</button>
      <button class="suggested-btn" onclick="sendSuggested(this)">How do I track my order?</button>
      <button class="suggested-btn" onclick="sendSuggested(this)">What are your support hours?</button>
    </div>
  </div>
</div>

<div class="input-area">
  <div class="input-wrapper">
    <textarea
      id="userInput"
      placeholder="Type your question here..."
      rows="1"
      onkeydown="handleKey(event)"
      oninput="autoResize(this)"
    ></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
  <div class="input-hint">Press Enter to send · Shift+Enter for new line</div>
</div>

<script>
  const WEBHOOK_URL = "https://pranay-auto.app.n8n.cloud/webhook/customer-support";
  const chatContainer = document.getElementById('chatContainer');
  const userInput = document.getElementById('userInput');
  const sendBtn = document.getElementById('sendBtn');

  function getTime() {
    return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function sendSuggested(btn) {
    userInput.value = btn.textContent;
    sendMessage();
  }

  function removeWelcome() {
    const welcome = document.getElementById('welcome');
    if (welcome) welcome.remove();
  }

  function appendMessage(content, type, isEscalation = false) {
    removeWelcome();
    const row = document.createElement('div');
    row.className = `message-row ${type === 'user' ? 'user' : 'bot'}`;

    const avatar = document.createElement('div');
    avatar.className = `avatar ${type === 'user' ? 'user' : 'bot'}`;
    avatar.textContent = type === 'user' ? '👤' : '🤖';

    const bubbleWrap = document.createElement('div');
    bubbleWrap.style.display = 'flex';
    bubbleWrap.style.flexDirection = 'column';
    bubbleWrap.style.alignItems = type === 'user' ? 'flex-end' : 'flex-start';

    const bubble = document.createElement('div');
    bubble.className = `bubble ${isEscalation ? 'escalate' : type}`;

    if (isEscalation) {
      const tag = document.createElement('div');
      tag.className = 'escalate-tag';
      tag.innerHTML = '✦ &nbsp;Connecting you to our team';
      bubble.appendChild(tag);
    }

    const text = document.createElement('div');
    text.textContent = content;
    bubble.appendChild(text);

    const time = document.createElement('div');
    time.className = 'timestamp';
    time.textContent = getTime();

    bubbleWrap.appendChild(bubble);
    bubbleWrap.appendChild(time);

    row.appendChild(avatar);
    row.appendChild(bubbleWrap);
    chatContainer.appendChild(row);
    chatContainer.scrollTop = chatContainer.scrollHeight;
  }

  function showTyping() {
    const row = document.createElement('div');
    row.className = 'message-row bot';
    row.id = 'typingRow';

    const avatar = document.createElement('div');
    avatar.className = 'avatar bot';
    avatar.textContent = '🤖';

    const indicator = document.createElement('div');
    indicator.className = 'typing-indicator';
    indicator.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';

    row.appendChild(avatar);
    row.appendChild(indicator);
    chatContainer.appendChild(row);
    chatContainer.scrollTop = chatContainer.scrollHeight;
  }

  function hideTyping() {
    const row = document.getElementById('typingRow');
    if (row) row.remove();
  }

  function isEscalationResponse(text) {
    const escalationPhrases = [
      "don't know", "cannot answer", "out of scope", "not sure",
      "escalat", "forward", "team will", "agent will", "human",
      "beyond my", "outside my", "not in my", "no information"
    ];
    const lower = text.toLowerCase();
    return escalationPhrases.some(p => lower.includes(p));
  }

  async function sendMessage() {
    const text = userInput.value.trim();
    if (!text) return;

    appendMessage(text, 'user');
    userInput.value = '';
    userInput.style.height = 'auto';
    sendBtn.disabled = true;
    showTyping();

    try {
      const response = await fetch(WEBHOOK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, chatInput: text, sessionId: getSessionId() })
      });

      hideTyping();

      if (!response.ok) throw new Error('Network error');

      const contentType = response.headers.get('content-type') || '';
      let reply;
      if (contentType.includes('application/json')) {
        const data = await response.json();
        reply = data.output || data.text || data.message || data.response || JSON.stringify(data);
      } else {
        reply = await response.text();
      }
      const escalation = isEscalationResponse(reply);
      appendMessage(reply, 'bot', escalation);

    } catch (err) {
      hideTyping();
      appendMessage("Sorry, I'm having trouble connecting right now. Please try again in a moment.", 'bot', false);
    }

    sendBtn.disabled = false;
    userInput.focus();
  }

  function getSessionId() {
    if (!sessionStorage.getItem('csSessionId')) {
      sessionStorage.setItem('csSessionId', 'session_' + Date.now());
    }
    return sessionStorage.getItem('csSessionId');
  }
</script>
</body>
</html>
